<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叶问 · 作物病害诊断助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f9f0;
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            height: 100vh;
        }
        /* 左侧固定宽度 */
        .intro {
            width: 260px;
            background: rgba(245, 249, 240, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 1;
        }
        .intro h1 {
            color: #2c5e2e;
            font-size: 1.8rem;
            margin: 0.5rem 0;
        }
        .intro p {
            color: #4a6b4a;
            font-size: 0.9rem;
            margin: 0.3rem 0;
        }
        .badge {
            background: #e0ebdd;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        /* 图标🌾样式保持不变 */
        .intro > div:first-child {
            font-size: 4rem;        
            line-height: 1.2;       
            margin-bottom: 0.1rem;  
        }
        .right-area {
            flex: 1;
            position: relative;
            background-color: #fcfdfa;
        }
        
        /* ========================================================= */
        /* 修改：移动工作流监控面板至左上角，并使布局更紧凑 */
        /* ========================================================= */
        .rag-monitor {
            position: absolute;
            top: 20px; /* 距离顶部 20px */
            left: 20px; /* 距离左侧 20px */
            width: 320px; /* 紧凑宽度 */
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 5px 20px rgba(44, 94, 46, 0.05);
            border: 1px solid #e0ebdd;
            pointer-events: none; /* 防止遮挡用户的点击操作 */
            z-index: 10; /* 确保在最上层 */
        }
        .monitor-header {
            font-size: 0.9rem; /* 字体减小 */
            color: #2c5e2e;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #4CAF50;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 6px #4CAF50;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(76, 175, 80, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        .workflow-box {
            display: flex;
            flex-direction: column;
            gap: 10px; /* 间隔减小 */
        }
        .wf-node {
            background: #f5f9f0;
            border: 1px dashed #c5d8c6; /* 边框变细 */
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            color: #666;
            font-size: 0.85rem; /* 字体减小 */
            transition: all 0.4s ease;
        }
        .wf-branches {
            display: flex;
            gap: 8px; /* 间隔减小 */
            justify-content: space-between;
        }
        .wf-branch-node {
            flex: 1;
            background: #f5f9f0;
            border: 1px dashed #c5d8c6; /* 边框变细 */
            padding: 8px 3px;
            border-radius: 6px;
            text-align: center;
            color: #666;
            font-size: 0.75rem; /* 字体减小 */
            transition: all 0.4s ease;
        }
        /* 激活状态的高亮特效保持不变 */
        .node-active {
            background: #e8f5e9 !important;
            border: 1px solid #4CAF50 !important;
            color: #1B5E20 !important;
            font-weight: bold;
            transform: scale(1.02);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.15);
        }
        /* ========================================================= */

        /* 覆盖扣子SDK的悬浮球和窗口位置逻辑不需修改 */
        .coze-chat-ball {
            position: fixed !important;
            right: 30px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            bottom: auto !important;
        }
        .coze-chat-window {
            width: 650px !important;
            height: 700px !important;
            right: 30px !important;
            bottom: auto !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            border-radius: 16px !important;
            box-shadow: 0 8px 28px rgba(0,0,0,0.2) !important;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .coze-chat-window {
                width: 90% !important;
                right: 5% !important;
                left: 5% !important;
                top: 10% !important;
                transform: none !important;
                height: 80% !important;
            }
            .coze-chat-ball {
                right: 15px !important;
                top: auto !important;
                bottom: 20px !important;
                transform: none !important;
            }
            .intro {
                width: 180px;
                padding: 1rem;
            }
            .intro h1 { font-size: 1.2rem; }
            .intro > div:first-child { font-size: 3.2rem; }
            .rag-monitor { display: none; } /* 移动端空间小，隐藏监控 */
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="intro">
        <div>🌾</div>
        <h1>叶问</h1>
        <p>作物病害智能诊断助手</p>
        <div class="badge">📸 支持图片 / 文字</div>
        <p style="margin-top: 1rem; font-size: 0.85rem;">👉 右侧悬浮球，点击问诊</p>
    </div>
    
    <div class="right-area">
        <div class="rag-monitor">
            <div class="monitor-header">
                <div class="status-dot"></div>
                核心引擎：diagnosis_main 工作流监控
            </div>
            <div class="workflow-box">
                <div class="wf-node" id="wf-1">📷 多模态视觉特征提取</div>
                <div class="wf-node" id="wf-2">🔀 LLM 意图路由分发</div>
                <div class="wf-branches">
                    <div class="wf-branch-node" id="wf-b1">🔍症状诊断</div>
                    <div class="wf-branch-node" id="wf-b2">🔬原因识别</div>
                    <div class="wf-branch-node" id="wf-b3">💊防治建议</div>
                </div>
                <div class="wf-node" id="wf-3">🧠 RAG 检索与上下文对齐</div>
                <div class="wf-node" id="wf-4">📝 诊断报告生成</div>
            </div>
        </div>
    </div>
</div>

<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
<script>
    // =========================================================
    // 模拟脚本保持不变
    // =========================================================
    function startWorkflowSimulation() {
        const nodes = [
            document.getElementById('wf-1'),
            document.getElementById('wf-2'),
            null, // 占位，给分支用
            document.getElementById('wf-3'),
            document.getElementById('wf-4')
        ];
        const branches = [
            document.getElementById('wf-b1'),
            document.getElementById('wf-b2'),
            document.getElementById('wf-b3')
        ];

        setInterval(() => {
            nodes.forEach(n => n && n.classList.remove('node-active'));
            branches.forEach(b => b.classList.remove('node-active'));

            let step = 0;
            const randomBranchIndex = Math.floor(Math.random() * 3);

            const interval = setInterval(() => {
                if (step > 0 && nodes[step - 1]) nodes[step - 1].classList.remove('node-active');
                if (step === 3) branches.forEach(b => b.classList.remove('node-active'));

                if (step === 2) {
                    branches[randomBranchIndex].classList.add('node-active');
                } else if (step < 5) {
                    nodes[step].classList.add('node-active');
                } else {
                    nodes[4].classList.remove('node-active');
                    clearInterval(interval);
                }
                step++;
            }, 800);
        }, 12000); 
    }
    
    window.addEventListener('DOMContentLoaded', startWorkflowSimulation);
    // =========================================================

    // 【原始鉴权和SDK启动逻辑原封不动】
    async function initCoze() {
        try {
            // 1. 悄悄去 Vercel 后端拿钥匙 (绝对安全)
            const response = await fetch('/api/getToken');
            const data = await response.json();
            const safeToken = data.token; 

            // 2. 原封不动地启动你的 SDK
            new CozeWebSDK.WebChatClient({
                config: {
                    type: 'bot',
                    bot_id: '7598192873783246882', // 你的真实 bot_id
                    isIframe: false,
                },
                auth: {
                    type: 'token',
                    token: safeToken, 
                    onRefreshToken: async () => safeToken 
                },
                userInfo: {
                    id: 'user',
                    url: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',
                    nickname: 'User',
                },
                ui: {
                    asstBtn: { isNeed: true },
                    chatBot: {
                        title: '叶问',
                        uploadable: true,
                        width: 960,
                        height: 700
                    },
                    header: { isShow: true, isNeedClose: true },
                    footer: { isShow: false },
                    base: {
                        layout: 'pc',
                        lang: 'zh-CN'
                    }
                }
            });
            
            // 3. 完美保留你的额外保险样式注入
            setTimeout(() => {
                const style = document.createElement('style');
                style.textContent = `
                    .coze-chat-window {
                        width: 650px !important;
                        height: 700px !important;
                        right: 30px !important;
                        top: 50% !important;
                        transform: translateY(-50%) !important;
                        bottom: auto !important;
                    }
                    .coze-chat-ball {
                        right: 30px !important;
                        top: 50% !important;
                        transform: translateY(-50%) !important;
                        bottom: auto !important;
                    }
                `;
                document.head.appendChild(style);
            }, 500);

        } catch (error) {
            console.error("获取 Token 或初始化失败:", error);
        }
    }

    // 执行初始化
    initCoze();
</script>
</body>
</html>
